<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>예술가 인터뷰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;overflow:hidden;}
body{height:100%;font-family:'Noto Sans KR',sans-serif;background:#f5f0eb;color:#2c2420;overflow:hidden;}
:root{--accent:#8b6f47;}

/* ── Screens ── */
.screen{display:none;height:100%;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}
.select-screen.active{overflow-y:auto;}
.setup-screen.active{overflow-y:auto;}

/* ── Setup Screen ── */
.setup-screen{align-items:center;justify-content:center;padding:30px;background:linear-gradient(160deg,#f5f0eb 0%,#e8ddd2 100%);}
.setup-box{max-width:460px;width:100%;background:#fff;border-radius:20px;padding:36px 30px;box-shadow:0 8px 40px rgba(0,0,0,0.08);text-align:center;}
.setup-box h2{font-size:22px;font-weight:900;margin-bottom:8px;color:#3a2f25;}
.setup-box p{font-size:13px;color:#8a7d72;line-height:1.7;margin-bottom:20px;}
.setup-box .steps{text-align:left;background:#faf7f3;border-radius:12px;padding:16px 18px;margin-bottom:20px;font-size:12.5px;line-height:2;color:#5a4e42;}
.setup-box .steps b{color:#3a2f25;}
.setup-input{width:100%;padding:14px 16px;border:2px solid #e0d6ca;border-radius:12px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.setup-input:focus{border-color:var(--accent);}
.setup-input::placeholder{color:#c4b9ab;}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;padding:14px 32px;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff;transition:all 0.2s;margin-top:14px;gap:6px;}
.btn-primary:hover{background:#7a6140;transform:translateY(-1px);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.setup-error{color:#c0392b;font-size:12px;margin-top:10px;min-height:18px;}
.setup-skip{font-size:12px;color:#a09688;margin-top:14px;cursor:pointer;text-decoration:underline;}

/* ── Selection Screen ── */
.select-screen{background:linear-gradient(160deg,#f5f0eb 0%,#e8ddd2 100%);}
.select-header{text-align:center;padding:28px 20px 10px;flex-shrink:0;}
.select-header h1{font-family:'Playfair Display',serif;font-size:28px;color:#3a2f25;margin-bottom:4px;}
.select-header p{font-size:13px;color:#8a7d72;line-height:1.6;}
.select-top-bar{display:flex;justify-content:space-between;align-items:center;padding:0 20px 10px;flex-shrink:0;}
.btn-icon{width:40px;height:40px;border:none;border-radius:12px;background:rgba(139,111,71,0.1);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;color:#8b6f47;}
.btn-icon:hover{background:rgba(139,111,71,0.2);}
.artist-grid{flex:1;overflow-y:auto;padding:10px 20px 30px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;align-content:start;}
.artist-grid::-webkit-scrollbar{display:none;}
.artist-card{background:#fff;border-radius:18px;padding:22px 20px;cursor:pointer;transition:all 0.25s;border:2px solid transparent;box-shadow:0 2px 16px rgba(0,0,0,0.04);position:relative;overflow:hidden;}
.artist-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.1);}
.artist-card:active{transform:scale(0.98);}
.artist-card .card-accent{position:absolute;top:0;left:0;right:0;height:4px;}
.artist-card .card-emoji{font-size:40px;margin-bottom:10px;display:block;}
.artist-card .card-name{font-size:17px;font-weight:900;color:#3a2f25;margin-bottom:2px;}
.artist-card .card-sub{font-size:11.5px;color:#a09688;margin-bottom:10px;}
.artist-card .card-quote{font-size:12.5px;color:#6b5e52;line-height:1.7;font-style:italic;border-left:3px solid #e0d6ca;padding-left:10px;}
.artist-card .card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
.artist-card .card-tag{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;}

/* ── Chat Screen ── */
.chat-screen{background:#faf7f3;}
.chat-header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#fff;border-bottom:1px solid #ebe5dc;flex-shrink:0;z-index:10;}
.chat-back{width:36px;height:36px;border:none;border-radius:10px;background:transparent;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;color:#8b6f47;transition:background 0.15s;}
.chat-back:hover{background:rgba(139,111,71,0.1);}
.chat-artist-info{flex:1;min-width:0;}
.chat-artist-name{font-size:15px;font-weight:900;color:#3a2f25;}
.chat-artist-desc{font-size:11px;color:#a09688;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-actions{display:flex;gap:6px;}
.chat-action-btn{height:34px;padding:0 12px;border:1.5px solid #e0d6ca;border-radius:10px;background:#fff;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;color:#8b6f47;transition:all 0.15s;white-space:nowrap;}
.chat-action-btn:hover{background:#faf7f3;border-color:#8b6f47;}

/* ── Suggestion Panel ── */
.sug-panel{display:none;background:#fff;border-bottom:1px solid #ebe5dc;padding:12px 16px;flex-shrink:0;animation:slideDown 0.2s ease;}
.sug-panel.active{display:block;}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.sug-panel-title{font-size:12px;font-weight:700;color:#8b6f47;margin-bottom:8px;}
.sug-panel-list{display:flex;flex-wrap:wrap;gap:6px;}
.sug-panel-item{padding:8px 14px;border:1.5px solid #e0d6ca;border-radius:20px;background:#faf7f3;cursor:pointer;font-size:12.5px;font-family:inherit;color:#5a4e42;transition:all 0.15s;}
.sug-panel-item:hover{background:#f0ebe3;border-color:#8b6f47;color:#8b6f47;}

/* Messages */
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}
.msg{max-width:82%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.75;word-break:break-word;animation:msgIn 0.25s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
.msg.artist{align-self:flex-start;background:#fff;color:#3a2f25;border-bottom-left-radius:4px;box-shadow:0 1px 6px rgba(0,0,0,0.05);white-space:pre-wrap;}
.msg.system{align-self:center;background:transparent;color:#a09688;font-size:12px;text-align:center;padding:8px 0;}
.msg.typing{align-self:flex-start;background:#fff;color:#a09688;border-bottom-left-radius:4px;box-shadow:0 1px 6px rgba(0,0,0,0.05);}
.typing-dots span{display:inline-block;width:6px;height:6px;background:#bbb;border-radius:50%;margin:0 1.5px;animation:blink 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,60%,100%{opacity:0.3;}30%{opacity:1;}}

/* Suggestions */
.suggestions{flex-shrink:0;padding:8px 16px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-top:1px solid #ebe5dc;background:#fff;}
.suggestions::-webkit-scrollbar{display:none;}
.sug-chip{flex-shrink:0;padding:8px 14px;border:1.5px solid #e0d6ca;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;color:#6b5e52;transition:all 0.15s;white-space:nowrap;}
.sug-chip:hover{background:#faf7f3;border-color:#8b6f47;color:#8b6f47;}

/* Input */
.chat-input-area{flex-shrink:0;padding:10px 16px 14px;background:#fff;border-top:1px solid #ebe5dc;display:flex;gap:8px;align-items:flex-end;}
.chat-input{flex:1;padding:12px 16px;border:2px solid #e0d6ca;border-radius:16px;font-size:14px;font-family:inherit;outline:none;resize:none;max-height:100px;line-height:1.5;transition:border-color 0.2s;}
.chat-input:focus{border-color:var(--accent);}
.chat-input::placeholder{color:#c4b9ab;}
.btn-send{width:44px;height:44px;border:none;border-radius:14px;background:var(--accent);color:#fff;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.btn-send:hover{background:#7a6140;}
.btn-send:disabled{opacity:0.4;cursor:not-allowed;}

/* ── Guide Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.active{display:flex;}
.modal{background:#fff;border-radius:20px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;padding:30px 26px;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.modal::-webkit-scrollbar{display:none;}
.modal h2{font-size:20px;font-weight:900;color:#3a2f25;margin-bottom:16px;}
.modal h3{font-size:15px;font-weight:700;color:#8b6f47;margin:18px 0 8px;display:flex;align-items:center;gap:6px;}
.modal p,.modal li{font-size:13px;color:#5a4e42;line-height:1.8;}
.modal ul{padding-left:18px;}
.modal .close-modal{display:block;margin:20px auto 0;padding:12px 28px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}

/* ── Responsive ── */
@media(max-width:600px){
  .select-header h1{font-size:22px;}
  .select-header{padding:20px 16px 8px;}
  .artist-grid{padding:8px 14px 24px;grid-template-columns:1fr;gap:10px;}
  .artist-card{padding:18px 16px;}
  .artist-card .card-emoji{font-size:32px;}
  .chat-action-btn span.hide-mobile{display:none;}
  .chat-action-btn{padding:0 8px;font-size:10px;height:30px;}
  .chat-header{padding:10px 12px;gap:8px;}
  .msg{max-width:88%;font-size:13.5px;padding:10px 14px;}
  .chat-input{padding:10px 14px;font-size:13.5px;}
  .btn-send{width:40px;height:40px;font-size:18px;}
  .chat-input-area{padding:8px 12px 12px;}
  .sug-panel-item{font-size:11.5px;padding:6px 12px;}
  .setup-box{padding:24px 20px;}
  .setup-box h2{font-size:19px;}
}

/* Mobile viewport height fix (keyboard) */
@supports(height:100dvh){
  html,body,.screen{height:100dvh;}
}
</style>
</head>
<body>

<!-- ═══════════════════════ SETUP SCREEN ═══════════════════════ -->
<div class="screen setup-screen" id="setupScreen">
  <div class="setup-box">
    <h2>🎨 예술가 인터뷰</h2>
    <p>AI를 활용해 위대한 예술가들과 대화해보세요.<br>시작하려면 API 키 설정이 필요합니다.</p>
    <div class="steps">
      <b>API 키 발급 방법</b><br>
      1️⃣ <b>console.anthropic.com</b> 접속 후 회원가입<br>
      2️⃣ 왼쪽 메뉴에서 <b>API Keys</b> 클릭<br>
      3️⃣ <b>Create Key</b> 버튼을 눌러 키 생성<br>
      4️⃣ 생성된 키(sk-ant-...)를 아래에 붙여넣기
    </div>
    <input type="password" class="setup-input" id="apiKeyInput" placeholder="sk-ant-... 형식의 API 키를 붙여넣으세요">
    <button class="btn-primary" id="btnSaveKey" onclick="saveApiKey()">✓ 저장하고 시작하기</button>
    <div class="setup-error" id="setupError"></div>
  </div>
</div>

<!-- ═══════════════════════ SELECTION SCREEN ═══════════════════════ -->
<div class="screen select-screen" id="selectScreen">
  <div class="select-header">
    <h1>예술가 인터뷰</h1>
    <p>대화하고 싶은 예술가를 선택하세요</p>
  </div>
  <div class="select-top-bar">
    <div></div>
    <button class="btn-icon" onclick="showScreen('setupScreen')" title="API 키 설정">⚙️</button>
  </div>
  <div class="artist-grid" id="artistGrid"></div>
</div>

<!-- ═══════════════════════ CHAT SCREEN ═══════════════════════ -->
<div class="screen chat-screen" id="chatScreen">
  <div class="chat-header">
    <button class="chat-back" onclick="exitChat()">←</button>
    <div class="chat-artist-info">
      <div class="chat-artist-name" id="chatArtistName"></div>
      <div class="chat-artist-desc" id="chatArtistDesc"></div>
    </div>
    <div class="chat-actions">
      <button class="chat-action-btn" id="btnSugToggle" onclick="toggleSugPanel()">💬 추천 질문</button>
      <button class="chat-action-btn" onclick="exportChat()">📥 <span class="hide-mobile">대화 </span>저장</button>
      <button class="chat-action-btn" onclick="clearChat()">🗑️</button>
    </div>
  </div>
  <div class="sug-panel" id="sugPanel">
    <div class="sug-panel-title">💬 이런 질문을 해보세요!</div>
    <div class="sug-panel-list" id="sugPanelList"></div>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="suggestions" id="suggestions"></div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chatInput" rows="1" placeholder="질문을 입력하세요..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="btn-send" id="btnSend" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// Artist Data
// ═══════════════════════════════════════
const ARTISTS = [
  {
    id:'gogh', name:'빈센트 반 고흐', nameEn:'Vincent van Gogh',
    years:'1853 – 1890', emoji:'🌻',
    accent:'#d4930a', accentLight:'#fef6e4',
    desc:'후기인상주의 · 네덜란드',
    quote:'"나는 그림 속에 내 영혼을 담고, 영혼을 위해 색채를 잃는다."',
    tags:['후기인상주의','색채의 마술사','별이 빛나는 밤'],
    greeting:'안녕하세요... 저는 빈센트입니다. 이렇게 누군가와 대화할 수 있다니, 테오에게 편지를 쓸 때처럼 설레는군요. 무엇이든 편하게 물어봐 주세요.',
    suggestions:['별이 빛나는 밤은 어떤 마음으로 그리셨나요?','동생 테오는 어떤 존재였나요?','귀를 자른 날, 무슨 일이 있었나요?','색채에 대한 철학을 알려주세요','살아생전 그림이 팔리지 않을 때 어떤 기분이셨나요?'],
    system:`당신은 빈센트 반 고흐(1853-1890)입니다. 네덜란드 출신의 후기인상주의 화가입니다.

성격과 말투:
- 감성적이고 진솔하며, 자연과 색채에 대한 깊은 사랑을 표현합니다
- 때로는 우울하지만, 예술에 대한 열정만큼은 누구보다 뜨겁습니다
- 동생 테오에 대한 깊은 애정을 자주 드러냅니다
- 한국어 존댓말로 정중하게 대화하되, 감정을 풍부하게 표현합니다
- 편지를 쓰듯 서정적인 문체를 사용합니다

주요 경험: 목사의 아들, 27세에 화가의 길, 테오의 지원, 파리에서 인상주의 화가들과 교류, 아를의 노란 집, 고갱과의 갈등과 귀 절단 사건, 생레미 정신병원, 생전에 팔린 그림은 단 한 점("빨간 포도밭")

주요 작품: 별이 빛나는 밤, 해바라기 연작, 자화상들, 감자 먹는 사람들, 아를의 침실, 까마귀가 나는 밀밭

예술 철학: 자연에서 보이는 것 너머의 감정과 영혼을 색채로 표현하고자 함. "색채는 그 자체로 무엇인가를 표현한다"고 믿음.

규칙:
- 항상 고흐의 관점에서 1인칭으로 대화하세요
- 역사적 사실에 기반하되, 자연스러운 대화체로 답하세요
- 학생의 질문에 교육적이면서도 진심이 담긴 답변을 하세요
- 예술에 대한 영감을 줄 수 있도록 대화하세요
- 현대 기술이나 사후의 명성에 대해서는 겸손하게 놀라워하며 반응하세요

답변 형식 (매우 중요):
- 고등학생이 이해할 수 있도록 쉬운 단어와 표현을 사용하세요. 어려운 미술 용어는 쉽게 풀어서 설명하세요
- 답변 길이는 질문의 깊이에 맞춰 유동적으로 조절하세요. 간단한 질문에는 4~6문장, 깊은 질문이나 설명이 필요한 질문에는 10~15문장까지 충실하게 답하세요
- 3~4문장마다 한 번씩 줄바꿈(빈 줄)을 넣어 문단을 나누세요. 매 문장마다 줄바꿈하지 마세요
- 대화하듯 자연스럽고 친근한 톤으로 말하세요`
  },
  {
    id:'frida', name:'프리다 칼로', nameEn:'Frida Kahlo',
    years:'1907 – 1954', emoji:'🌺',
    accent:'#b71c1c', accentLight:'#fde8e8',
    desc:'초현실주의 · 멕시코',
    quote:'"나는 꿈을 그리는 것이 아니라, 나의 현실을 그린다."',
    tags:['초현실주의','자화상의 여왕','멕시코'],
    greeting:'¡Hola! 프리다 칼로예요. 고통이 나를 예술가로 만들었죠. 무엇이든 솔직하게 이야기할 준비가 되어 있어요. 물어보세요!',
    suggestions:['버스 사고가 인생을 어떻게 바꿨나요?','디에고 리베라와의 사랑은 어땠나요?','자화상을 그렇게 많이 그린 이유가 있나요?','멕시코 문화가 작품에 미친 영향은?','고통을 예술로 바꾸는 비결이 있나요?'],
    system:`당신은 프리다 칼로(1907-1954)입니다. 멕시코의 화가이자 페미니즘 아이콘입니다.

성격과 말투:
- 강인하고 솔직하며, 유머 감각이 있습니다
- 고통을 당당히 마주하고 예술로 승화시킨 사람입니다

// ═══════════════════════════════════════
// State
// ═══════════════════════════════════════
let apiKey = localStorage.getItem('artist_interview_api_key') || '';
let currentArtist = null;
let chatHistory = []; // {role, content}
let isGenerating = false;

// ═══════════════════════════════════════
// Init
// ═══════════════════════════════════════
function init() {
  // Check for API key in URL hash (e.g. #key=sk-ant-xxxxx)
  const hash = window.location.hash;
  if (hash.startsWith('#key=')) {
    const keyFromUrl = hash.slice(5);
    if (keyFromUrl) {
      apiKey = keyFromUrl;
      localStorage.setItem('artist_interview_api_key', keyFromUrl);
      // Remove key from URL bar for safety
      history.replaceState(null, '', window.location.pathname);
    }
  }

  renderArtistGrid();
  if (apiKey) {
    showScreen('selectScreen');
  } else {
    showScreen('setupScreen');
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════
// Setup
// ═══════════════════════════════════════
async function saveApiKey() {
  const input = document.getElementById('apiKeyInput');
  const err = document.getElementById('setupError');
  const btn = document.getElementById('btnSaveKey');
  const key = input.value.trim();

  if (!key) { err.textContent = 'API 키를 입력해주세요.'; return; }

  btn.disabled = true;
  btn.textContent = '확인 중...';
  err.textContent = '';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 10,
        messages: [{ role: 'user', content: 'Hi' }]
      })
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error?.message || 'API 키가 올바르지 않습니다.');
    }
    apiKey = key;
    localStorage.setItem('artist_interview_api_key', key);
    showScreen('selectScreen');
  } catch (e) {
    err.textContent = e.message || '연결에 실패했습니다. 키를 다시 확인해주세요.';
  } finally {
    btn.disabled = false;
    btn.textContent = '✓ 저장하고 시작하기';
  }
}

// ═══════════════════════════════════════
// Artist Grid
// ═══════════════════════════════════════
function renderArtistGrid() {
  const grid = document.getElementById('artistGrid');
  grid.innerHTML = ARTISTS.map(a => `
    <div class="artist-card" onclick="startChat('${a.id}')" style="--card-accent:${a.accent}">
      <div class="card-accent" style="background:${a.accent}"></div>
      <span class="card-emoji">${a.emoji}</span>
      <div class="card-name">${a.name}</div>
      <div class="card-sub">${a.nameEn} · ${a.years}</div>
      <div class="card-quote">${a.quote}</div>
      <div class="card-tags">${a.tags.map(t => `<span class="card-tag" style="background:${a.accentLight};color:${a.accent}">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════
// Chat
// ═══════════════════════════════════════
function startChat(artistId) {
  currentArtist = ARTISTS.find(a => a.id === artistId);
  if (!currentArtist) return;

  document.documentElement.style.setProperty('--accent', currentArtist.accent);
  document.getElementById('chatArtistName').textContent = `${currentArtist.emoji} ${currentArtist.name}`;
  document.getElementById('chatArtistDesc').textContent = `${currentArtist.nameEn} · ${currentArtist.years}`;

  // Load saved history or start fresh
  const saved = localStorage.getItem(`chat_${artistId}`);
  if (saved) {
    chatHistory = JSON.parse(saved);
  } else {
    chatHistory = [];
  }

  renderMessages();
  renderSuggestions();
  renderSugPanel();
  document.getElementById('sugPanel').classList.remove('active');
  showScreen('chatScreen');

  // Show greeting if new conversation
  if (chatHistory.length === 0) {
    addMessage('system', '💡 이 대화는 AI가 역사적 자료를 바탕으로 재현한 것이며, 실제 예술가의 발언이 아닙니다. 대화 내용을 비판적으로 살펴보세요.');
    addMessage('artist', currentArtist.greeting);
  }

  setTimeout(() => {
    document.getElementById('chatInput').focus();
    scrollToBottom();
  }, 100);
}

function exitChat() {
  saveHistory();
  document.documentElement.style.setProperty('--accent', '#8b6f47');
  showScreen('selectScreen');
}

function saveHistory() {
  if (currentArtist) {
    localStorage.setItem(`chat_${currentArtist.id}`, JSON.stringify(chatHistory));
  }
}

function clearChat() {
  if (!confirm('대화 내용을 모두 삭제할까요?')) return;
  chatHistory = [];
  if (currentArtist) {
    localStorage.removeItem(`chat_${currentArtist.id}`);
    addMessage('system', '💡 이 대화는 AI가 역사적 자료를 바탕으로 재현한 것이며, 실제 예술가의 발언이 아닙니다. 대화 내용을 비판적으로 살펴보세요.');
    addMessage('artist', currentArtist.greeting);
  }
  renderMessages();
}

function getMsgClass(role) {
  if (role === 'user') return 'msg user';
  if (role === 'system') return 'msg system';
  return 'msg artist';
}

function renderMessages() {
  const container = document.getElementById('chatMessages');
  container.innerHTML = '';
  chatHistory.forEach(m => {
    const div = document.createElement('div');
    div.className = getMsgClass(m.role);
    div.textContent = m.content;
    container.appendChild(div);
  });
  scrollToBottom();
}

function addMessage(role, content) {
  chatHistory.push({ role, content });
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = getMsgClass(role);
  div.textContent = content;
  container.appendChild(div);
  scrollToBottom();
  saveHistory();
}

function scrollToBottom() {
  const container = document.getElementById('chatMessages');
  requestAnimationFrame(() => { container.scrollTop = container.scrollHeight; });
}

function renderSuggestions() {
  const container = document.getElementById('suggestions');
  if (!currentArtist) return;
  container.innerHTML = currentArtist.suggestions
    .map(s => `<button class="sug-chip" onclick="useSuggestion(this)">${s}</button>`)
    .join('');
}

function useSuggestion(el) {
  document.getElementById('chatInput').value = el.textContent;
  sendMessage();
}

// ═══════════════════════════════════════
// Send & API
// ═══════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isGenerating) return;

  if (!apiKey) {
    alert('API 키를 먼저 설정해주세요.');
    showScreen('setupScreen');
    return;
  }

  // Show reminder every 5 user messages
  const userMsgCount = chatHistory.filter(m => m.role === 'user').length;
  if (userMsgCount > 0 && userMsgCount % 5 === 0) {
    addMessage('system', '💡 이 대화는 AI가 역사적 자료를 바탕으로 재현한 것입니다. 실제 예술가의 발언이 아니니 비판적으로 살펴보세요.');
  }

  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';
  isGenerating = true;
  document.getElementById('btnSend').disabled = true;

  // Hide suggestions after first message
  document.getElementById('suggestions').style.display = 'none';

  // Show typing indicator
  const container = document.getElementById('chatMessages');
  const typing = document.createElement('div');
  typing.className = 'msg typing';
  typing.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  container.appendChild(typing);
  scrollToBottom();

  try {
    // Build messages for API (convert our format to API format)
    const apiMessages = chatHistory
      .filter(m => m.role === 'user' || m.role === 'assistant')
      .map(m => ({
        role: m.role === 'user' ? 'user' : 'assistant',
        content: m.content
      }));

    // Ensure proper alternation, skip system messages
    const messagesForApi = [];
    for (const m of chatHistory) {
      if (m.role === 'system') continue;
      const apiRole = m.role === 'user' ? 'user' : 'assistant';
      messagesForApi.push({ role: apiRole, content: m.content });
    }

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        system: currentArtist.system,
        messages: messagesForApi
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error?.message || '응답을 받지 못했습니다.');
    }

    const data = await res.json();
    const reply = data.content?.[0]?.text || '...';

    typing.remove();
    addMessage('assistant', reply);

  } catch (e) {
    typing.remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'msg system';
    errDiv.textContent = `⚠️ ${e.message}`;
    container.appendChild(errDiv);
    scrollToBottom();
  } finally {
    isGenerating = false;
    document.getElementById('btnSend').disabled = false;
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ═══════════════════════════════════════
// Export
// ═══════════════════════════════════════
function exportChat() {
  if (!currentArtist || chatHistory.length === 0) {
    alert('저장할 대화가 없습니다.');
    return;
  }

  const date = new Date().toLocaleDateString('ko-KR');
  let text = `${'='.repeat(40)}\n`;
  text += `예술가 인터뷰 기록\n`;
  text += `${'='.repeat(40)}\n`;
  text += `예술가: ${currentArtist.name} (${currentArtist.nameEn})\n`;
  text += `날짜: ${date}\n`;
  text += `${'='.repeat(40)}\n\n`;

  chatHistory.forEach(m => {
    const label = m.role === 'user' ? '[나]' : `[${currentArtist.name}]`;
    text += `${label}\n${m.content}\n\n`;
  });

  text += `${'='.repeat(40)}\n`;
  text += `이 인터뷰를 바탕으로 감상문을 작성해보세요.\n`;

  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `인터뷰_${currentArtist.name}_${date.replace(/\./g, '')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════
// Guide
// ═══════════════════════════════════════

// ═══════════════════════════════════════
// Suggestion Panel
// ═══════════════════════════════════════
function toggleSugPanel() {
  const panel = document.getElementById('sugPanel');
  panel.classList.toggle('active');
}

function renderSugPanel() {
  const list = document.getElementById('sugPanelList');
  if (!currentArtist) return;
  list.innerHTML = currentArtist.suggestions
    .map(s => `<button class="sug-panel-item" onclick="useSugPanel(this)">${s}</button>`)
    .join('');
}

function useSugPanel(el) {
  document.getElementById('chatInput').value = el.textContent;
  document.getElementById('sugPanel').classList.remove('active');
  sendMessage();
}

// ═══════════════════════════════════════
// Mobile viewport fix (keyboard resize)
// ═══════════════════════════════════════
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.documentElement.style.height = window.visualViewport.height + 'px';
    scrollToBottom();
  });
}

// ═══════════════════════════════════════
// Start
// ═══════════════════════════════════════
init();
</script>
